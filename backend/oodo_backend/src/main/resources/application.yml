spring:
  application:
    name: assetflow
  datasource:
    url: jdbc:postgresql://localhost:5432/assetflow
    username: assetflow
    password: assetflow
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 100
  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: your-secret-key-change-this-in-production-with-minimum-32-characters
  expiration-ms: 86400000

server:
  port: 8080
  servlet:
    context-path: /api
